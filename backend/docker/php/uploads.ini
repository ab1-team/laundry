; PHP upload limits untuk APK release flow.
;
; Default php:8.4-fpm-alpine:
;   post_max_size      = 8M    → blok upload > 8MB sebelum Laravel lihat request
;   upload_max_filesize = 2M    → blok upload > 2MB
;   memory_limit       = 128M  → buffer file di-memory saat multipart parse
;
; Upload APK divalidasi max 100MB di Laravel (ReleaseController::upload
; 'max:102400'). Set 120M di PHP supaya sedikit di atas limit Laravel —
; kalau file > 100MB, Laravel return proper validation error, bukan
; PHP warning "POST Content-Length exceeds limit".
;
; memory_limit dinaikkan karena multipart parser buffer body in-memory
; sementara sebelum di-pass ke $_FILES. Tanpa buffer cukup, upload
; 60MB gagal dengan "Allowed memory size exhausted".
;
; File di-load dari /usr/local/etc/php/conf.d/ oleh php-fpm, di-copy
; oleh Dockerfile step setelah install extension. zz-prefix sort order
; supaya override setelah default config (sesuai pola zz-dotenv.ini).
file_uploads       = On
post_max_size      = 120M
upload_max_filesize = 120M
memory_limit       = 256M