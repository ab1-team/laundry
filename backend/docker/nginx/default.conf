server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Serve uploaded files (Storage::disk('public') → public/storage
    # symlink → storage/app/public). Tanpa location ini, request ke
    # /storage/* fall-through ke PHP-FPM (yang return 403 karena path
    # bukan route). Allow symlink resolution since path-bound by our
    # bind-mount — tidak ada risiko follow ke file di luar container.
    location /storage/ {
        alias /var/www/html/public/storage/;
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
