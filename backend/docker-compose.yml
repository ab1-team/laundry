name: "laundry"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laundry-app
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - laundry-net

  nginx:
    image: nginx:alpine
    container_name: laundry-nginx
    ports:
      - "8006:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laundry-net

  mysql:
    image: mysql:8.0
    container_name: laundry-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: laundry
      MYSQL_USER: laundry
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laundry-net

  redis:
    image: redis:alpine
    container_name: laundry-redis
    ports:
      - "6380:6379"
    networks:
      - laundry-net

volumes:
  mysql-data:

networks:
  laundry-net:
    driver: bridge
  web-network:
    external: true
