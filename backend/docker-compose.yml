name: "laundry"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laundry-app
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    networks:
      - laundry-net
      - web-network

    # Bind-mount source code & .env dari host.
    # ./storage/app → /var/www/html/storage/app (persist uploaded APK)
    # ./.env         → /var/www/html/.env (konfigurasi runtime)
    #
    # Image sudah include source + vendor (di-build oleh Dockerfile),
    # sehingga container tidak perlu bind-mount source/vendor. Yang
    # di-bind-mount hanya file .env dan storage upload — data yang
    # ditulis runtime (bukan source code).
    env_file:
      - .env
    volumes:
      # .env TIDAK di-bind-mount dari host. Container manage .env
      # sendiri via docker/entrypoint.sh (copy dari .env.example, chown
      # www-data). Sebelumnya di-mount dari host tapi menyebabkan
      # "Operation not permitted" di artisan key:generate — owner file
      # di host (root atau user SSH) tidak match container user www-data,
      # dan permission bits di host tidak selalu propagate benar ke
      # bind-mount.
      #
      # env_file di section env tetap inject host .env sebagai env vars
      # ke process container (DB_HOST, APP_KEY, dll) — orthogonal dengan
      # filesystem .env di container.
      #
      # Persist uploaded APK di luar container — kalau image di-rebuild,
      # file upload user tetap ada di host.
      - ./storage/app:/var/www/html/storage/app

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laundry-nginx
    restart: unless-stopped
    ports:
      - "8006:80"
    depends_on:
      - app
    networks:
      - laundry-net
      - web-network

  mysql:
    image: mysql:8.0
    container_name: laundry-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laundry}
      MYSQL_USER: ${DB_USERNAME:-laundry}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laundry-net
      - web-network

  redis:
    image: redis:alpine
    container_name: laundry-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - laundry-net
      - web-network

volumes:
  mysql-data:

networks:
  laundry-net:
    driver: bridge
  web-network:
    external: true