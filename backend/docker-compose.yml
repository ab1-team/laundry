name: "laundry"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laundry-app
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    networks:
      - laundry-net
      - web-network

    # Single source of truth untuk environment: file `.env` di host
    # (di-mount ke container sebagai /var/www/html/.env). Edit .env di
    # host → restart container → env baru live. TIDAK PERNAH image
    # membawa .env, sehingga deploy ulang image tidak akan menghapus
    # konfigurasi server.
    env_file:
      - .env
    volumes:
      # Persist uploaded APK di luar container — kalau image di-rebuild,
      # APK yang sudah di-upload tidak ikut hilang.
      - ./storage/app:/var/www/html/storage/app

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laundry-nginx
    restart: unless-stopped
    ports:
      - "8006:80"
    depends_on:
      - app
    networks:
      - laundry-net
      - web-network

  mysql:
    image: mysql:8.0
    container_name: laundry-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laundry}
      MYSQL_USER: ${DB_USERNAME:-laundry}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laundry-net
      - web-network

  redis:
    image: redis:alpine
    container_name: laundry-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - laundry-net
      - web-network

volumes:
  mysql-data:

networks:
  laundry-net:
    driver: bridge
  web-network:
    external: true