name: "laundry"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laundry-app
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    networks:
      - laundry-net
      - web-network

    # Bind-mount source code & .env dari host.
    # ./storage/app → /var/www/html/storage/app (persist uploaded APK)
    # ./.env         → /var/www/html/.env (konfigurasi runtime)
    #
    # Image sudah include source + vendor (di-build oleh Dockerfile),
    # sehingga container tidak perlu bind-mount source/vendor. Yang
    # di-bind-mount hanya file .env dan storage upload — data yang
    # ditulis runtime (bukan source code).
    env_file:
      - .env
    volumes:
      # Bind-mount .env dari host supaya config customized (DB_HOST,
      # DB_PASSWORD, dll) terbaca langsung oleh Laravel. Container juga
      # bisa tulis ke .env via key:generate, hasilnya persistent di host.
      #
      # entrypoint.sh chmod/chown ke www-data supaya php-fpm worker
      # bisa tulis. Workflow deploy.yml handle pre-chown di host via
      # sudo karena file mungkin owner=root setelah git pull / copy.
      - ./.env:/var/www/html/.env
      # Persist uploaded APK di luar container — kalau image di-rebuild,
      # file upload user tetap ada di host.
      - ./storage/app:/var/www/html/storage/app

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laundry-nginx
    restart: unless-stopped
    ports:
      - "8006:80"
    depends_on:
      - app
    # Bind-mount public/ dari host supaya symlink `public/storage` yang
    # dibuat oleh `php artisan storage:link` (di container app) terbaca
    # oleh nginx. Tanpa ini, image nginx cuma punya public/ statis saat
    # build dan symlink storage hilang, jadi request ke /storage/* return
    # 403 karena nginx tidak bisa resolve symlink.
    #
    # storage/app/public juga di-mount karena symlink public/storage
    # mengarah ke /var/www/html/storage/app/public — path itu harus ada
    # di filesystem nginx container untuk resolve ke file aslinya.
    volumes:
      - ./public:/var/www/html/public
      - ./storage/app/public:/var/www/html/storage/app/public
    networks:
      - laundry-net
      - web-network

  mysql:
    image: mysql:8.0
    container_name: laundry-mysql
    restart: unless-stopped
    ports:
      # Port host 3308 (bukan 3307) untuk hindari konflik dengan
      # mysql:8.0 container project lain (enmarket-db) yang masih jalan.
      # Port container tetap 3306 — app talk ke "mysql:3306" via network.
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laundry}
      MYSQL_USER: ${DB_USERNAME:-laundry}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laundry-net
      - web-network

  redis:
    image: redis:alpine
    container_name: laundry-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - laundry-net
      - web-network

volumes:
  mysql-data:

networks:
  laundry-net:
    driver: bridge
  web-network:
    external: true