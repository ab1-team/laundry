name: "laundry"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laundry-app
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    networks:
      - laundry-net
      - web-network

    # Bind-mount source code & .env dari host.
    # ./         → /var/www/html          (source code: app/, config/, dll)
    # ./.env     → /var/www/html/.env     (konfigurasi runtime)
    # ./vendor   → /var/www/html/vendor   (dependensi PHP)
    #
    # Mount 3 file/dir terpisah supaya container lihat source yang
    # SAMA PERSIS dengan host. Edit di host = container ikut.
    # key:generate di container = host .env ke-update.
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./.env:/var/www/html/.env
      - ./vendor:/var/www/html/vendor

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laundry-nginx
    restart: unless-stopped
    ports:
      - "8006:80"
    depends_on:
      - app
    networks:
      - laundry-net
      - web-network

  mysql:
    image: mysql:8.0
    container_name: laundry-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laundry}
      MYSQL_USER: ${DB_USERNAME:-laundry}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laundry-net
      - web-network

  redis:
    image: redis:alpine
    container_name: laundry-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - laundry-net
      - web-network

volumes:
  mysql-data:

networks:
  laundry-net:
    driver: bridge
  web-network:
    external: true