name: "laundry"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laundry-app
    depends_on:
      - mysql
      - redis
    networks:
      - laundry-net

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laundry-nginx
    ports:
      - "8006:80"
    depends_on:
      - app
    networks:
      - laundry-net

  mysql:
    image: mysql:8.0
    container_name: laundry-mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-laundry}
      MYSQL_USER: ${MYSQL_USER:-laundry}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laundry-net

  redis:
    image: redis:alpine
    container_name: laundry-redis
    ports:
      - "6380:6379"
    networks:
      - laundry-net

volumes:
  mysql-data:

networks:
  laundry-net:
    driver: bridge
  web-network:
    external: true
