name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/enpii/apps/laundryaja/backend

            git pull origin main

            # Pastikan .env exist. File di-.gitignore sehingga git pull
            # tidak menyentuh — bootstrap dari .env.example kalau hilang.
            if [ ! -f .env ]; then
              if [ -f .env.example ]; then
                echo "Membuat .env dari .env.example..."
                cp .env.example .env
              else
                echo "::error::.env.example tidak ada — tidak bisa bootstrap .env."
                exit 1
              fi
            fi

            # Pre-chown .env ke www-data (uid 33 di php:8.4-fpm-alpine)
            # supaya container bisa tulis ke .env via bind-mount.
            # docker/entrypoint.sh juga chown di dalam container tapi
            # chown hanya affect owner di host view, tidak affect view
            # dari bind-mount kalau file di-mount dengan metadata cache.
            # Pre-chown di host memastikan container lihat owner yang
            # benar saat mount. sudo karena user SSH bukan owner file
            # (biasanya root dari cp / git pull).
            if [ -f .env ]; then
              sudo chown 33:33 .env
            fi

            # Build image. Tanpa --no-cache supaya Docker pakai layer cache
            # dari build sebelumnya — second build hanya ~30 detik karena
            # cuma re-build layer yang berubah. cold build (~2-3 menit)
            # hanya di first deploy atau kalau Dockerfile/composer.lock
            # berubah.
            echo "Building image..."
            docker compose build app

            docker compose down --remove-orphans
            docker compose up -d

            # Tunggu container app siap.
            echo "Waiting for app container..."
            for i in $(seq 1 30); do
              if docker compose exec -T app php -r 'exit(0);' >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done

            # Generate APP_KEY kalau masih kosong. Cek host .env — kalau
            # sudah ada (deploy setelah first run), skip. Kalau kosong,
            # generate di dalam container, lalu SYNC balik ke host .env
            # supaya persistent untuk deploy berikutnya. Tanpa sync,
            # key regenerate tiap deploy → semua encrypted session invalid.
            CURRENT_KEY=$(grep '^APP_KEY=' .env | cut -d= -f2-)
            if [ -z "$CURRENT_KEY" ]; then
              echo "APP_KEY kosong — generate..."
              docker compose exec -T app php artisan key:generate --force
              # Pull key yang baru di-generate dari container .env dan
              # replace line APP_KEY= di host .env. Karena bind-mount
              # host→container share file yang sama, key SUDAH di host
              # file — tapi host .env mungkin sudah punya line APP_KEY=
              # kosong yang perlu di-overwrite. Gunakan sed untuk
              # replace in-place.
              NEW_KEY=$(docker compose exec -T app grep '^APP_KEY=' .env | cut -d= -f2-)
              if [ -n "$NEW_KEY" ]; then
                sed -i "s|^APP_KEY=.*|APP_KEY=${NEW_KEY}|" .env
                echo "APP_KEY disync ke host .env."
              fi
              # Force-clear compiled config & view cache sehingga
              # APP_KEY baru di-load fresh, bukan dari cache lama yang
              # masih punya APP_KEY="" (string kosong). Tanpa clear
              # ini, "MissingAppKeyException" bisa muncul walau .env
              # sudah punya key — config cache hold empty string.
              docker compose exec -T app php artisan config:clear || true
              docker compose exec -T app php artisan cache:clear || true
            fi

            # Run migrations SEBELUM cache:clear — kalau driver cache/session
            # pakai database, tabel 'cache' dan 'sessions' harus exist dulu.
            echo "Running migrations..."
            docker compose exec -T app php artisan migrate --force || {
              echo "::warning::Migration gagal. Cek docker compose logs app untuk detail."
              docker compose logs --tail=100 app
            }

            # Storage symlink (idempotent).
            docker compose exec -T app php artisan storage:link || true

            # Clear config & view cache supaya .env baru terbaca.
            docker compose exec -T app php artisan config:clear || true
            docker compose exec -T app php artisan cache:clear || true

            # Optimize caches.
            docker compose exec -T app php artisan optimize || true

            docker compose ps
            docker compose logs --tail=50 app