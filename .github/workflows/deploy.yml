name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/enpii/apps/laundryaja/backend

            git pull origin main

            # .env tidak boleh di-overwrite oleh git pull — sudah di
            # .gitignore, tapi amankan kalau ada setup salah: backup dulu,
            # lalu restore kalau file masih ada setelah pull.
            if [ -f .env ]; then
              cp .env .env.deploy-backup
            fi
            git pull origin main
            if [ -f .env.deploy-backup ] && [ ! -f .env ]; then
              echo "::warning::.env hilang setelah git pull, restore dari backup."
              mv .env.deploy-backup .env
            elif [ -f .env.deploy-backup ]; then
              rm .env.deploy-backup
            fi

            # Deploy pertama atau file terhapus: buat .env dari .env.example
            # lalu generate APP_KEY. env_file di docker-compose akan mount
            # file ini ke container.
            if [ ! -f .env ]; then
              echo "Membuat .env dari .env.example..."
              cp .env.example .env
              echo "APP_KEY akan di-generate setelah container jalan."
            fi

            docker compose pull || true
            docker compose up -d

            # Tunggu app + mysql sehat sebelum migrate — DB host harus
            # bisa di-resolve dari container app (depends_on sudah cover,
            # tapi MySQL butuh waktu untuk inisialisasi pertama run).
            echo "Waiting for app container to be healthy..."
            for i in $(seq 1 30); do
              if docker compose exec -T app php -r 'exit(0);' >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done

            # Generate APP_KEY kalau masih kosong (deploy pertama).
            # env_file di docker-compose sudah mount .env ke container,
            # jadi key yang di-generate persistent di host file.
            #
            # Wajib di-clear config cache sebelum migrate / key:generate
            # supaya perubahan env terbaca. Tanpa clear, Laravel pakai
            # cache lama → APP_KEY tetap dianggap kosong walau sudah di-set.
            docker compose exec -T app php artisan config:clear || true
            CURRENT_KEY=$(grep '^APP_KEY=' .env | cut -d= -f2-)
            if [ -z "$CURRENT_KEY" ]; then
              echo "APP_KEY kosong — generate..."
              docker compose exec -T app php artisan key:generate --force
            fi

            # Jalankan migrasi. --force skip prompt konfirmasi di env
            # non-interaktif. Idempotent — Laravel skip migration yang
            # sudah tercatat di tabel `migrations`.
            #
            # || true supaya deploy tidak gagal total kalau ada migration
            # yang error (developer perlu lihat log, bukan block CI).
            # Cek log di: docker compose logs --tail=100 app
            echo "Running migrations..."
            docker compose exec -T app php artisan migrate --force || {
              echo "::warning::Migration gagal. Cek docker compose logs app untuk detail."
              docker compose logs --tail=100 app
            }

            # Storage symlink kalau baru pertama deploy (idempotent).
            docker compose exec -T app php artisan storage:link || true

            # Optimize supaya config/route/view di-cache setelah deploy.
            docker compose exec -T app php artisan optimize || true

            docker compose ps
            docker compose logs --tail=50 app
