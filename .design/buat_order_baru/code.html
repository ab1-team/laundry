<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>LaundryKu - Buat Order Baru</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#332100",
                        "surface-container": "#f0edf0",
                        "outline-variant": "#c6c6ce",
                        "secondary-fixed": "#c2e8ff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#303033",
                        "surface-bright": "#fbf8fb",
                        "on-surface": "#1b1b1e",
                        "inverse-on-surface": "#f3f0f3",
                        "surface-container-highest": "#e4e2e5",
                        "surface": "#fbf8fb",
                        "on-tertiary-fixed-variant": "#59431c",
                        "on-primary-fixed-variant": "#3d4665",
                        "secondary": "#006688",
                        "primary-container": "#1a2340",
                        "tertiary-fixed": "#ffdeab",
                        "on-background": "#1b1b1e",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dcd9dc",
                        "on-primary-container": "#828aad",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#76767e",
                        "on-secondary-fixed": "#001e2b",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#004d67",
                        "secondary-container": "#58cafe",
                        "surface-container-high": "#eae7ea",
                        "primary-fixed": "#dbe1ff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#e2c290",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e4e2e5",
                        "tertiary": "#180d00",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#281900",
                        "background": "#fbf8fb",
                        "on-secondary-container": "#005370",
                        "primary-fixed-dim": "#bdc5ea",
                        "surface-container-low": "#f6f3f6",
                        "on-primary-fixed": "#111a37",
                        "primary": "#040d2a",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#bdc5ea",
                        "on-tertiary-container": "#a4875a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "container-padding": "20px",
                        "gutter": "16px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "label-lg": ["DM Sans"],
                        "title-lg": ["DM Sans"],
                        "headline-md": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "body-md": ["DM Sans"],
                        "label-sm": ["DM Sans"],
                        "display-lg": ["DM Sans"]
                    },
                    "fontSize": {
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                        "title-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "headline-md-mobile": ["20px", {"lineHeight": "26px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F5F7FA;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        .custom-shadow {
            box-shadow: 0 4px 16px rgba(13, 33, 64, 0.12);
        }
        .active-dot::after {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            background-color: #58cafe;
            border-radius: 50%;
            margin-top: 2px;
        }
        input:focus {
            outline: none;
            border-color: #58cafe !important;
            box-shadow: 0 0 0 2px rgba(88, 202, 254, 0.2);
        }
    </style>
</head>
<body class="text-on-surface bg-background min-h-screen pb-32">
<!-- Top AppBar -->
<header class="fixed top-0 left-0 w-full z-40 bg-surface dark:bg-surface-container-highest shadow-sm flex items-center justify-between px-container-padding py-stack-md">
<div class="flex items-center gap-3">
<button class="active:scale-95 duration-100 p-2 hover:bg-surface-container-high rounded-full transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed-dim font-bold">Buat Order Baru</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">help_outline</span>
</button>
</div>
</header>
<main class="pt-24 px-container-padding max-w-md mx-auto space-y-stack-lg">
<!-- Customer Picker Section -->
<section class="space-y-stack-sm">
<div class="flex justify-between items-center">
<h2 class="font-title-lg text-title-lg text-primary">Pilih Customer</h2>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface rounded-[20px] border border-[#90A4AE] focus:border-secondary transition-all font-body-md text-body-md shadow-sm" placeholder="Cari nama atau nomor HP..." type="text">
</div>
<button class="w-full flex items-center justify-center gap-2 py-3 bg-secondary-fixed text-on-secondary-fixed rounded-full font-label-lg text-label-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined">person_add</span>
                Tambah Customer
            </button>
</section>
<!-- Service Selection -->
<section class="space-y-stack-sm">
<h2 class="font-title-lg text-title-lg text-primary">Layanan</h2>
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="service-pill flex-shrink-0 px-6 py-2.5 rounded-full border-2 border-secondary bg-secondary text-on-secondary font-label-lg text-label-lg transition-all" onclick="selectService(this)">
                    Kiloan
                </button>
<button class="service-pill flex-shrink-0 px-6 py-2.5 rounded-full border-2 border-outline-variant bg-surface text-on-surface-variant font-label-lg text-label-lg transition-all" onclick="selectService(this)">
                    Satuan
                </button>
<button class="service-pill flex-shrink-0 px-6 py-2.5 rounded-full border-2 border-outline-variant bg-surface text-on-surface-variant font-label-lg text-label-lg transition-all" onclick="selectService(this)">
                    Express
                </button>
</div>
</section>
<!-- Quantity Input Card -->
<div class="bg-surface p-container-padding rounded-[32px] custom-shadow space-y-stack-md border border-surface-container-high">
<div class="flex justify-between items-center">
<span class="font-label-lg text-label-lg text-on-surface-variant">Jumlah Pesanan</span>
<span class="bg-secondary-container/20 text-on-secondary-container px-3 py-1 rounded-full font-label-sm text-label-sm">Kg / Pcs</span>
</div>
<div class="flex items-center justify-between gap-4">
<button class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center active:scale-90 duration-100" onclick="stepDown()">
<span class="material-symbols-outlined text-primary">remove</span>
</button>
<div class="flex-1 flex flex-col items-center">
<input class="w-full text-center bg-transparent border-none font-display-lg text-display-lg focus:ring-0 p-0" id="quantity" oninput="calculateTotal()" step="0.1" type="number" value="0.0">
<span class="text-outline font-label-sm text-label-sm uppercase tracking-widest">Berat Estimasi</span>
</div>
<button class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center active:scale-90 duration-100" onclick="stepUp()">
<span class="material-symbols-outlined text-primary">add</span>
</button>
</div>
</div>
<!-- Payment Toggle & Method -->
<section class="space-y-stack-md">
<h2 class="font-title-lg text-title-lg text-primary">Pembayaran</h2>
<!-- Status Toggle -->
<div class="flex p-1 bg-surface-container-high rounded-full">
<button class="pay-status-btn flex-1 py-2 rounded-full font-label-lg text-label-lg transition-all bg-white shadow-sm text-primary" onclick="togglePaymentStatus(this, 'Lunas')">
                    Lunas
                </button>
<button class="pay-status-btn flex-1 py-2 rounded-full font-label-lg text-label-lg transition-all text-on-surface-variant" onclick="togglePaymentStatus(this, 'DP')">
                    DP
                </button>
<button class="pay-status-btn flex-1 py-2 rounded-full font-label-lg text-label-lg transition-all text-on-surface-variant" onclick="togglePaymentStatus(this, 'Hutang')">
                    Hutang
                </button>
</div>
<!-- Payment Methods -->
<div class="grid grid-cols-3 gap-3">
<button class="pay-method-btn flex flex-col items-center gap-2 p-4 rounded-[24px] border-2 border-secondary bg-secondary/5 text-secondary transition-all" onclick="selectMethod(this)">
<span class="material-symbols-outlined">payments</span>
<span class="font-label-sm text-label-sm">Cash</span>
</button>
<button class="pay-method-btn flex flex-col items-center gap-2 p-4 rounded-[24px] border-2 border-outline-variant bg-surface text-on-surface-variant transition-all" onclick="selectMethod(this)">
<span class="material-symbols-outlined">account_balance</span>
<span class="font-label-sm text-label-sm">Transfer</span>
</button>
<button class="pay-method-btn flex flex-col items-center gap-2 p-4 rounded-[24px] border-2 border-outline-variant bg-surface text-on-surface-variant transition-all" onclick="selectMethod(this)">
<span class="material-symbols-outlined">qr_code_2</span>
<span class="font-label-sm text-label-sm">QRIS</span>
</button>
</div>
</section>
<!-- Summary & Submit -->
<div class="space-y-stack-md">
<div class="flex justify-between items-center px-2">
<span class="font-body-lg text-body-lg text-on-surface-variant">Total Tagihan</span>
<span class="font-headline-md text-headline-md text-primary" id="totalPrice">Rp 0</span>
</div>
<button class="w-full py-5 bg-primary text-on-primary rounded-full font-headline-md text-headline-md-mobile active:scale-95 transition-all shadow-lg hover:shadow-xl">
                Simpan Order
            </button>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-surface dark:bg-surface-container shadow-[0_-4px_16px_0_rgba(0,0,0,0.12)] rounded-t-[28px] z-50">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1.5 active:scale-90 duration-200 active-dot" href="#">
<span class="material-symbols-outlined filled-icon" data-icon="receipt_long" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-label-sm text-label-sm font-bold">Order</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Customer</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="assessment">assessment</span>
<span class="font-label-sm text-label-sm">Laporan</span>
</a>
</nav>
<script>
        function selectService(btn) {
            document.querySelectorAll('.service-pill').forEach(el => {
                el.classList.remove('bg-secondary', 'text-on-secondary', 'border-secondary');
                el.classList.add('bg-surface', 'text-on-surface-variant', 'border-outline-variant');
            });
            btn.classList.remove('bg-surface', 'text-on-surface-variant', 'border-outline-variant');
            btn.classList.add('bg-secondary', 'text-on-secondary', 'border-secondary');
            calculateTotal();
        }

        function togglePaymentStatus(btn, status) {
            document.querySelectorAll('.pay-status-btn').forEach(el => {
                el.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                el.classList.add('text-on-surface-variant');
            });
            btn.classList.add('bg-white', 'shadow-sm', 'text-primary');
            btn.classList.remove('text-on-surface-variant');
        }

        function selectMethod(btn) {
            document.querySelectorAll('.pay-method-btn').forEach(el => {
                el.classList.remove('border-secondary', 'bg-secondary/5', 'text-secondary');
                el.classList.add('border-outline-variant', 'bg-surface', 'text-on-surface-variant');
            });
            btn.classList.add('border-secondary', 'bg-secondary/5', 'text-secondary');
            btn.classList.remove('border-outline-variant', 'bg-surface', 'text-on-surface-variant');
        }

        function stepUp() {
            const input = document.getElementById('quantity');
            input.value = (parseFloat(input.value) + 0.5).toFixed(1);
            calculateTotal();
        }

        function stepDown() {
            const input = document.getElementById('quantity');
            if (parseFloat(input.value) > 0) {
                input.value = (parseFloat(input.value) - 0.5).toFixed(1);
            }
            calculateTotal();
        }

        function calculateTotal() {
            const qty = parseFloat(document.getElementById('quantity').value) || 0;
            const pricePerKg = 7000;
            const total = qty * pricePerKg;
            document.getElementById('totalPrice').innerText = 'Rp ' + total.toLocaleString('id-ID');
        }
    </script>
</body></html>
